<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web2Work - Iniciar Sesión</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="pagina-auth">
    <div class="login-contenedor">
        <div class="login-logo">
            <img src="/imagenes/Imagen1.jpeg" alt="Web2Work">
        </div>

        <p class="auth-titulo">INICIAR SESIÓN</p>

        <div th:if="${error}" class="alerta alerta-error">
            Correo o contraseña incorrectos.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-grupo">
                <label>CORREO ELECTRÓNICO *</label>
                <input type="email" name="username" placeholder="correo@ejemplo.com" required>
            </div>
            <div class="form-grupo">
                <label>CONTRASEÑA *</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primario btn-completo">ENTRAR</button>

            <div class="auth-links">
                <a th:href="@{/recuperar}">¿Olvidaste la contraseña?</a>
                <a th:href="@{/registro}">Registrarse</a>
            </div>
        </form>
    </div>
    <script th:src="@{/js/scripts.js}"></script>
</body>
</html>
