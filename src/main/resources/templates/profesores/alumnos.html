<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web2Work - Alumnos</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="/imagenes/Imagen1.jpeg" alt="Web2Work">
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a th:href="@{/profesores/dashboard}">Dashboard</a></li>
                <li><a th:href="@{/convenios}">Convenios FE</a></li>
                <li class="activo"><a th:href="@{/profesores/alumnos}">Alumnos</a></li>
                <li><a th:href="@{/busqueda}">Búsqueda</a></li>
                <li><a th:href="@{/mensajes}">Mensajería</a></li>
                <li><a th:href="@{/notificaciones}">Notificaciones</a></li>
                <li><a th:href="@{/perfil}">Mi perfil</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <a th:href="@{/logout}" class="btn-logout">Cerrar sesión</a>
        </div>
    </div>

    <div class="contenido">
        <div class="cabecera">
            <h1>Listado de alumnos</h1>
            <div class="usuario-info"><span>Profesor</span></div>
        </div>

        <div class="contenido-inner">
            <div class="tabla-contenedor">
                <h2>Alumnos</h2>
                <div class="tabla-acciones">
                    <input type="text" id="buscadorAlumnos"
                           placeholder="Buscar alumno..."
                           onkeyup="filtrarAlumnos()" class="input-busqueda">
                    <a th:href="@{/asignaciones/nueva}" class="btn-primario">
                        + Asignar alumno
                    </a>
                </div>
                <table id="tablaAlumnos">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>DNI</th>
                            <th>Curso</th>
                            <th>Grupo</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="alumno : ${alumnos}">
                            <td th:text="${alumno.nombre + ' ' + alumno.apellidos}">Nombre</td>
                            <td th:text="${alumno.dni}">DNI</td>
                            <td th:text="${alumno.curso}">Curso</td>
                            <td th:text="${alumno.grupo}">Grupo</td>
                            <td>
                                <a th:href="@{/profesores/alumnos/{id}(id=${alumno.id})}"
                                   class="btn-teal btn-pequeño">Ver</a>
                                <a th:href="@{/evaluaciones/nueva}"
                                   class="btn-secundario btn-pequeño">Evaluar</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(alumnos)}">
                            <td colspan="5" class="sin-datos">
                                No hay alumnos registrados.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script th:src="@{/js/scripts.js}"></script>
</body>
</html>
