<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web2Work - Alumnos por empresa</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="/imagenes/Imagen1.jpeg" alt="Web2Work">
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a th:href="@{/admin/dashboard}">Dashboard</a></li>
                <li><a th:href="@{/admin/usuarios}">Gestión usuarios</a></li>
                <li><a th:href="@{/admin/roles}">Roles</a></li>
                <li><a th:href="@{/admin/config}">Config. sistema</a></li>
                <li><a th:href="@{/notificaciones}">Notificaciones</a></li>
                <li class="activo"><a th:href="@{/admin/informes}">Informes</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <a th:href="@{/logout}" class="btn-logout">Cerrar sesión</a>
        </div>
    </div>

    <div class="contenido">
        <div class="cabecera">
            <h1>Alumnos por empresa</h1>
            <div class="usuario-info"><span>Admin</span></div>
        </div>

        <div class="contenido-inner">
            <div class="form-acciones" style="margin-bottom: 16px;">
                <a th:href="@{/admin/informes}" class="btn-secundario">← Volver</a>
            </div>

            <div th:each="entry : ${alumnosPorEmpresa}">
                <div class="tabla-contenedor">
                    <h2 th:text="${entry.key}">Empresa</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Alumno</th>
                                <th>Curso</th>
                                <th>Horas realizadas</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="asignacion : ${entry.value}">
                                <td th:text="${asignacion.alumno.nombre + ' '
                                             + asignacion.alumno.apellidos}">Alumno</td>
                                <td th:text="${asignacion.alumno.curso}">Curso</td>
                                <td th:text="${asignacion.horasRealizadas}">0</td>
                                <td>
                                    <span th:class="'badge badge-'
                                                   + ${asignacion.estadoAsignacion}"
                                          th:text="${asignacion.estadoAsignacion}">
                                        Estado
                                    </span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div th:if="${#maps.isEmpty(alumnosPorEmpresa)}"
                 class="alerta alerta-info">
                No hay asignaciones registradas.
            </div>
        </div>
    </div>

    <script th:src="@{/js/scripts.js}"></script>
</body>
</html>
