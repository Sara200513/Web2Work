<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web2Work - Progreso alumnos</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="/imagenes/Imagen1.jpeg" alt="Web2Work">
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a th:href="@{/admin/dashboard}">Dashboard</a></li>
                <li><a th:href="@{/admin/usuarios}">Gestión usuarios</a></li>
                <li><a th:href="@{/admin/roles}">Roles</a></li>
                <li><a th:href="@{/admin/config}">Config. sistema</a></li>
                <li><a th:href="@{/notificaciones}">Notificaciones</a></li>
                <li class="activo"><a th:href="@{/admin/informes}">Informes</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <a th:href="@{/logout}" class="btn-logout">Cerrar sesión</a>
        </div>
    </div>

    <div class="contenido">
        <div class="cabecera">
            <h1>Progreso por alumno</h1>
            <div class="usuario-info"><span>Admin</span></div>
        </div>

        <div class="contenido-inner">
            <div class="form-acciones" style="margin-bottom: 16px;">
                <a th:href="@{/admin/informes}" class="btn-secundario">← Volver</a>
            </div>

            <div class="tabla-contenedor">
                <h2>Estado de prácticas</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Alumno</th>
                            <th>Empresa</th>
                            <th>Horas realizadas</th>
                            <th>Horas totales</th>
                            <th>Progreso</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="dato : ${progreso}">
                            <td th:text="${dato.alumno}">Alumno</td>
                            <td th:text="${dato.empresa}">Empresa</td>
                            <td th:text="${dato.horasRealizadas}">0</td>
                            <td th:text="${dato.horasTotales}">0</td>
                            <td>
                                <div class="progreso-barra">
                                    <div class="progreso-relleno"
                                         th:style="'width:' + ${dato.porcentaje} + '%'">
                                    </div>
                                </div>
                                <span th:text="${dato.porcentaje} + '%'">0%</span>
                            </td>
                            <td>
                                <span th:class="'badge badge-' + ${dato.estado}"
                                      th:text="${dato.estado}">Estado</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(progreso)}">
                            <td colspan="6" class="sin-datos">
                                No hay datos de progreso.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script th:src="@{/js/scripts.js}"></script>
</body>
</html>
