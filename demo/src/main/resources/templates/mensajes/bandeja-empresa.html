<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web2Work - Mensajeria</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/mensajeria.css}">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="/imagenes/Imagen1.jpeg" alt="Web2Work">
        </div>
	       <nav class="sidebar-nav">
	            <ul>
	                <li><a th:href="@{/empresas/dashboard}">Dashboard</a></li>
	                <li><a th:href="@{/empresas/alumnos}">Alumnos</a></li>
	                <li><a th:href="@{/convenios}">Convenios</a></li>
	                <li class="activo"><a th:href="@{/mensajes}">Mensajería</a></li>
	                <li><a th:href="@{/notificaciones}">Notificaciones</a></li>
	                <li><a th:href="@{/perfil}">Mi perfil</a></li>
	            </ul>
	        </nav>
        <div class="sidebar-footer">
            <a th:href="@{/logout}" class="btn-logout">Cerrar sesion</a>
        </div>
    </div>

    <div class="contenido">
        <div class="cabecera">
            <h1>Mensajeria</h1>
            <div class="usuario-info"><span>Empresa</span></div>
        </div>

        <div class="contenido-inner">
            <div class="mensajeria-contenedor">
                <div class="conversaciones-panel">
                    <div class="conversaciones-cabecera">
                        <h3>Conversaciones</h3>
                        <a th:href="@{/mensajes/nuevo}" class="btn-teal btn-pequeño">+ Nuevo</a>
                    </div>
                    <ul class="conversaciones-lista">
                        <li th:each="mensaje : ${mensajes}"
                            class="conversacion-item"
                            th:classappend="${!mensaje.leido} ? ' no-leido'">
                            <a th:href="@{/mensajes/conversacion/{cid}(cid=${mensaje.conversacionId})}">
                                <span class="conv-nombre"
                                      th:text="${mensaje.fromUser.id == usuarioActualId}
                                               ? 'Tu a ' + ${mensaje.toUser.nombre} + ' ' + ${mensaje.toUser.apellidos}
                                               : ${mensaje.fromUser.nombre} + ' ' + ${mensaje.fromUser.apellidos}">
                                    Usuario
                                </span>
                                <span class="conv-asunto" th:text="${mensaje.asunto}">Asunto</span>
                                <span class="conv-preview" th:text="${mensaje.cuerpo}">Preview...</span>
                                <span class="conv-fecha" th:text="${mensaje.createdAt}">Fecha</span>
                            </a>
                        </li>
                        <li th:if="${#lists.isEmpty(mensajes)}" class="sin-datos">
                            No hay conversaciones todavia.
                        </li>
                    </ul>
                </div>
                <div class="mensaje-panel">
                    <div class="mensaje-vacio">
                        <p>Selecciona una conversacion para ver los mensajes</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/scripts.js}"></script>
</body>
</html>
