<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web2Work - Mensajería</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/mensajeria.css}">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="/imagenes/Imagen1.jpeg" alt="Web2Work">
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a th:href="@{/alumnos/dashboard}">Dashboard</a></li>
                <li><a th:href="@{/actividades/nueva}">Mis prácticas</a></li>
                <li><a th:href="@{/alumnos/progreso}">Mi progreso</a></li>
                <li class="activo"><a th:href="@{/mensajes}">Mensajería</a></li>
                <li><a th:href="@{/notificaciones}">Notificaciones</a></li>
                <li><a th:href="@{/perfil}">Mi perfil</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <a th:href="@{/logout}" class="btn-logout">Cerrar sesión</a>
        </div>
    </div>

    <div class="contenido">
        <div class="cabecera">
            <h1>Mensajería</h1>
            <div class="usuario-info"><span>Alumno</span></div>
        </div>

        <div class="contenido-inner">
            <div class="mensajeria-contenedor">

                <!-- LISTA CONVERSACIONES -->
                <div class="conversaciones-panel">
                    <div class="conversaciones-cabecera">
                        <h3>Conversaciones</h3>
                        <a th:href="@{/mensajes/nuevo}" class="btn-teal btn-pequeño">+ Nuevo</a>
                    </div>
                    <ul class="conversaciones-lista">
                        <li th:each="mensaje : ${mensajes}"
                            class="conversacion-item"
                            th:classappend="${!mensaje.leido} ? ' no-leido'">
                            <a th:href="@{/mensajes/conversacion/{cid}(cid=${mensaje.conversacionId})}">
                                <span class="conv-nombre"
                                      th:text="${mensaje.fromUser.nombre + ' ' + mensaje.fromUser.apellidos}">
                                    Usuario
                                </span>
                                <span class="conv-preview"
                                      th:text="${mensaje.cuerpo}">
                                    Último mensaje...
                                </span>
                            </a>
                        </li>
                        <li th:if="${#lists.isEmpty(mensajes)}" class="sin-datos">
                            No hay mensajes.
                        </li>
                    </ul>
                </div>

                <!-- PANEL MENSAJE -->
                <div class="mensaje-panel">
                    <div class="mensaje-vacio">
                        <p>Selecciona una conversación para ver los mensajes</p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script th:src="@{/js/scripts.js}"></script>
</body>
</html>
