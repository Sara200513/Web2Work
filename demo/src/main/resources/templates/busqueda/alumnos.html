<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web2Work - Filtrar alumnos</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="/imagenes/Imagen1.jpeg" alt="Web2Work">
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a th:href="@{/dashboard}">Dashboard</a></li>
                <li><a th:href="@{/alumnos}">Alumnos</a></li>
                <li><a th:href="@{/convenios}">Convenios FE</a></li>
                <li class="activo"><a th:href="@{/busqueda}">Búsqueda</a></li>
                <li><a th:href="@{/mensajes}">Mensajería</a></li>
                <li><a th:href="@{/notificaciones}">Notificaciones</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <a th:href="@{/logout}" class="btn-logout">Cerrar sesión</a>
        </div>
    </div>

    <div class="contenido">
        <div class="cabecera">
            <h1>Filtrar alumnos</h1>
        </div>

        <div class="contenido-inner">
            <div class="tabla-contenedor">
                <h2>Filtros</h2>
                <div class="info-empresa">
                    <form th:action="@{/busqueda/alumnos}" method="get">
                        <div class="fila-dos-columnas">
                            <div class="form-grupo">
                                <label>BÚSQUEDA</label>
                                <input type="text" name="texto"
                                       th:value="${texto}"
                                       placeholder="Nombre o DNI...">
                            </div>
                            <div class="form-grupo">
                                <label>CURSO</label>
                                <select name="curso">
                                    <option value="">Todos los cursos</option>
                                    <option value="1º DAW"
                                            th:selected="${curso == '1º DAW'}">1º DAW</option>
                                    <option value="2º DAW"
                                            th:selected="${curso == '2º DAW'}">2º DAW</option>
                                    <option value="1º DAM"
                                            th:selected="${curso == '1º DAM'}">1º DAM</option>
                                    <option value="2º DAM"
                                            th:selected="${curso == '2º DAM'}">2º DAM</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-grupo">
                            <label>GRUPO</label>
                            <select name="grupo">
                                <option value="">Todos los grupos</option>
                                <option value="A" th:selected="${grupo == 'A'}">A</option>
                                <option value="B" th:selected="${grupo == 'B'}">B</option>
                            </select>
                        </div>
                        <div class="form-acciones">
                            <button type="submit" class="btn-primario">Filtrar</button>
                            <a th:href="@{/busqueda/alumnos}"
                               class="btn-secundario">Limpiar filtros</a>
                        </div>
                    </form>
                </div>
            </div>

            <div class="tabla-contenedor">
                <h2>Resultados</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>DNI</th>
                            <th>Curso</th>
                            <th>Grupo</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="alumno : ${alumnos}">
                            <td th:text="${alumno.nombre + ' ' + alumno.apellidos}">Nombre</td>
                            <td th:text="${alumno.dni}">DNI</td>
                            <td th:text="${alumno.curso}">Curso</td>
                            <td th:text="${alumno.grupo}">Grupo</td>
                            <td>
                                <a th:href="@{/profesores/alumnos/{id}(id=${alumno.id})}"
                                   class="btn-teal btn-pequeño">Ver</a>
                            </td>
                        </tr>
                        <tr th:if="${alumnos == null or #lists.isEmpty(alumnos)}">
                            <td colspan="5" class="sin-datos">
                                No se encontraron alumnos.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script th:src="@{/js/scripts.js}"></script>
</body>
</html>
