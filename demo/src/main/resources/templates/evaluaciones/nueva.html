<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web2Work - Nueva evaluación</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="/imagenes/Imagen1.jpeg" alt="Web2Work">
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a th:href="@{/profesores/dashboard}">Dashboard</a></li>
                <li><a th:href="@{/convenios}">Convenios FE</a></li>
                <li><a th:href="@{/alumnos}">Alumnos</a></li>
                <li><a th:href="@{/mensajes}">Mensajería</a></li>
                <li><a th:href="@{/notificaciones}">Notificaciones</a></li>
                <li><a th:href="@{/perfil}">Mi perfil</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <a th:href="@{/logout}" class="btn-logout">Cerrar sesión</a>
        </div>
    </div>

    <div class="contenido">
        <div class="cabecera">
            <h1>Nueva evaluación</h1>
            <div class="usuario-info"><span>Profesor</span></div>
        </div>

        <div class="contenido-inner">
            <div class="formulario">
                <h2>Evaluar alumno</h2>
                <form th:action="@{/evaluaciones/nueva}" method="post">
                    <div class="form-grupo">
                        <label>ASIGNACIÓN *</label>
                        <select name="asignacionId" required>
                            <option value="">Seleccionar alumno...</option>
                            <option th:each="asignacion : ${asignaciones}"
                                    th:value="${asignacion.id}"
                                    th:text="${asignacion.alumno.nombre + ' ' +
                                    asignacion.alumno.apellidos + ' - ' +
                                    asignacion.convenio.empresa.nombreEmpresa}">
                                Alumno
                            </option>
                        </select>
                    </div>
                    <div class="form-grupo">
                        <label>TIPO DE EVALUACIÓN *</label>
                        <select name="tipo" required>
                            <option value="intermedio">Intermedia</option>
                            <option value="final">Final</option>
                        </select>
                    </div>

                    <p class="seccion-titulo">RÚBRICA DE EVALUACIÓN</p>

                    <div class="rubrica-item">
                        <label>IMPLICACIÓN</label>
                        <div class="rubrica-opciones">
                            <label><input type="radio" name="implicacion" value="1"> Insuficiente</label>
                            <label><input type="radio" name="implicacion" value="2"> Suficiente</label>
                            <label><input type="radio" name="implicacion" value="3"> Bien</label>
                            <label><input type="radio" name="implicacion" value="4"> Notable</label>
                            <label><input type="radio" name="implicacion" value="5"> Excelente</label>
                        </div>
                    </div>

                    <div class="rubrica-item">
                        <label>CAPACIDAD TÉCNICA</label>
                        <div class="rubrica-opciones">
                            <label><input type="radio" name="capacidadTecnica" value="1"> Insuficiente</label>
                            <label><input type="radio" name="capacidadTecnica" value="2"> Suficiente</label>
                            <label><input type="radio" name="capacidadTecnica" value="3"> Bien</label>
                            <label><input type="radio" name="capacidadTecnica" value="4"> Notable</label>
                            <label><input type="radio" name="capacidadTecnica" value="5"> Excelente</label>
                        </div>
                    </div>

                    <div class="rubrica-item">
                        <label>PUNTUALIDAD</label>
                        <div class="rubrica-opciones">
                            <label><input type="radio" name="puntualidad" value="1"> Insuficiente</label>
                            <label><input type="radio" name="puntualidad" value="2"> Suficiente</label>
                            <label><input type="radio" name="puntualidad" value="3"> Bien</label>
                            <label><input type="radio" name="puntualidad" value="4"> Notable</label>
                            <label><input type="radio" name="puntualidad" value="5"> Excelente</label>
                        </div>
                    </div>

                    <div class="rubrica-item">
                        <label>ACTITUD</label>
                        <div class="rubrica-opciones">
                            <label><input type="radio" name="actitud" value="1"> Insuficiente</label>
                            <label><input type="radio" name="actitud" value="2"> Suficiente</label>
                            <label><input type="radio" name="actitud" value="3"> Bien</label>
                            <label><input type="radio" name="actitud" value="4"> Notable</label>
                            <label><input type="radio" name="actitud" value="5"> Excelente</label>
                        </div>
                    </div>

                    <div class="rubrica-item">
                        <label>TRABAJO EN EQUIPO</label>
                        <div class="rubrica-opciones">
                            <label><input type="radio" name="trabajoEquipo" value="1"> Insuficiente</label>
                            <label><input type="radio" name="trabajoEquipo" value="2"> Suficiente</label>
                            <label><input type="radio" name="trabajoEquipo" value="3"> Bien</label>
                            <label><input type="radio" name="trabajoEquipo" value="4"> Notable</label>
                            <label><input type="radio" name="trabajoEquipo" value="5"> Excelente</label>
                        </div>
                    </div>

                    <div class="form-grupo">
                        <label>NOTA FINAL *</label>
                        <input type="number" name="notaFinal"
                               min="0" max="10" step="0.1"
                               placeholder="0.0" required>
                    </div>
                    <div class="form-grupo">
                        <label>COMENTARIOS GLOBALES</label>
                        <textarea name="comentarios"
                                  placeholder="Comentarios generales de la evaluación..."></textarea>
                    </div>
                    <div class="form-acciones">
                        <button type="submit" class="btn-primario">Guardar evaluación</button>
                        <a th:href="@{/alumnos}" class="btn-secundario">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:src="@{/js/scripts.js}"></script>
</body>
</html>
