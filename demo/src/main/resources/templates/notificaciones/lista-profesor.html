<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web2Work - Notificaciones</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/mensajeria.css}">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="/imagenes/Imagen1.jpeg" alt="Web2Work">
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a th:href="@{/profesores/dashboard}">Dashboard</a></li>
                <li><a th:href="@{/convenios}">Convenios FE</a></li>
                <li><a th:href="@{/profesores/alumnos}">Alumnos</a></li>
                <li><a th:href="@{/busqueda}">Búsqueda</a></li>
                <li><a th:href="@{/mensajes}">Mensajería</a></li>
                <li class="activo"><a th:href="@{/notificaciones}">Notificaciones</a></li>
                <li><a th:href="@{/perfil}">Mi perfil</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <a th:href="@{/logout}" class="btn-logout">Cerrar sesión</a>
        </div>
    </div>

    <div class="contenido">
        <div class="cabecera">
            <h1>Notificaciones</h1>
            <div class="usuario-info"><span>Profesor</span></div>
        </div>

        <div class="contenido-inner">
            <div class="tabla-contenedor">
                <h2>Centro de notificaciones</h2>
                <ul class="notificaciones-lista">
                    <li th:each="notificacion : ${notificaciones}"
                        th:classappend="${!notificacion.leido} ? ' no-leida'"
                        class="notificacion-item">
                        <div class="notificacion-contenido">
                            <span th:class="'badge-notif badge-' + ${notificacion.tipo.toLowerCase()}"
                                  th:text="${notificacion.tipo}">Tipo</span>
                            <p th:text="${notificacion.texto}">Texto</p>
                            <span class="notificacion-fecha"
                                  th:text="${notificacion.createdAt}">Fecha</span>
                        </div>
                        <div class="notificacion-accion">
                            <a th:if="${notificacion.link != null}"
                               th:href="${notificacion.link}"
                               class="btn-teal btn-pequeño">Ver</a>
                            <a th:href="@{/notificaciones/marcar-leida/{id}(id=${notificacion.id})}"
                               class="btn-secundario btn-pequeño">
                               Marcar leída
                            </a>
                        </div>
                    </li>
                    <li th:if="${#lists.isEmpty(notificaciones)}"
                        class="notificacion-item">
                        <div class="notificacion-contenido">
                            <p class="sin-datos">No hay notificaciones.</p>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </div>
    <script th:src="@{/js/scripts.js}"></script>
</body>
</html>
