<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web2Work - Verificación de cuenta</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="pagina-auth">
    <div class="login-contenedor">
        <div class="login-logo">
            <img src="/imagenes/Imagen1.jpeg" alt="Web2Work">
        </div>

        <p class="auth-titulo">VERIFICACIÓN DE CUENTA</p>

        <div th:if="${mensajeExito}" class="alerta alerta-exito">
            <span th:text="${mensajeExito}"></span>
        </div>

        <div th:if="${mensajeError}" class="alerta alerta-error">
            <span th:text="${mensajeError}"></span>
        </div>

        <div class="auth-volver">
            <a th:href="@{/login}">← Ir al inicio de sesión</a>
        </div>
    </div>
    <script th:src="@{/js/scripts.js}"></script>
</body>
</html>
