<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Web2Work - Convenios FE</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo"><img src="/imagenes/Imagen1.jpeg" alt="Web2Work"></div>
        <nav class="sidebar-nav"><ul>
            <li><a th:href="@{/profesores/dashboard}">Dashboard</a></li>
            <li class="activo"><a th:href="@{/convenios}">Convenios FE</a></li>
            <li><a th:href="@{/profesores/alumnos}">Alumnos</a></li>
            <li><a th:href="@{/busqueda}">Búsqueda</a></li>
            <li><a th:href="@{/mensajes}">Mensajería</a></li>
            <li><a th:href="@{/notificaciones}">Notificaciones</a></li>
            <li><a th:href="@{/perfil}">Mi perfil</a></li>
        </ul></nav>
        <div class="sidebar-footer"><a th:href="@{/logout}" class="btn-logout">Cerrar sesión</a></div>
    </div>
    <div class="contenido">
        <div class="cabecera"><h1>Convenios de Formación en Empresa</h1><div class="usuario-info"><span>Profesor</span></div></div>
        <div class="contenido-inner">
            <div class="tabla-contenedor">
                <div class="tabla-acciones">
                    <a th:href="@{/convenios/nuevo}" class="btn-primario">+ Nuevo convenio</a>
                </div>
                <table>
                    <thead><tr><th>Empresa</th><th>Fecha inicio</th><th>Fecha fin</th><th>Horas</th><th>Estado</th><th>Acciones</th></tr></thead>
                    <tbody>
                        <tr th:each="convenio : ${convenios}">
                            <td th:text="${convenio.empresa.nombreEmpresa}">Empresa</td>
                            <td th:text="${convenio.fechaInicio}">Fecha</td>
                            <td th:text="${convenio.fechaFin}">Fecha</td>
                            <td th:text="${convenio.horasTotales}">0</td>
                            <td><span th:class="'badge badge-' + ${convenio.estado}"
                                      th:text="${convenio.estado}">Estado</span></td>
                            <td><a th:href="@{/convenios/{id}(id=${convenio.id})}"
                                   class="btn-teal btn-pequeño">Ver</a></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(convenios)}">
                            <td colspan="6" class="sin-datos">No hay convenios.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script th:src="@{/js/scripts.js}"></script>
</body></html>
