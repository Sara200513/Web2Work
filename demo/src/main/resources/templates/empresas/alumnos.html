<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Web2Work - Alumnos</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo"><img src="/imagenes/Imagen1.jpeg" alt="Web2Work"></div>
        <nav class="sidebar-nav"><ul>
            <li><a th:href="@{/empresas/dashboard}">Dashboard</a></li>
            <li class="activo"><a th:href="@{/empresas/alumnos}">Alumnos</a></li>
            <li><a th:href="@{/convenios}">Convenios</a></li>
            <li><a th:href="@{/mensajes}">Mensajería</a></li>
            <li><a th:href="@{/notificaciones}">Notificaciones</a></li>
            <li><a th:href="@{/perfil}">Mi perfil</a></li>
        </ul></nav>
        <div class="sidebar-footer"><a th:href="@{/logout}" class="btn-logout">Cerrar sesión</a></div>
    </div>
    <div class="contenido">
        <div class="cabecera"><h1>Alumnos asignados</h1><div class="usuario-info"><span>Empresa</span></div></div>
        <div class="contenido-inner">
            <div class="tabla-contenedor">
                <h2>Lista de alumnos</h2>
                <table>
                    <thead><tr><th>Nombre</th><th>Curso</th><th>DNI</th><th>Email</th><th>Acciones</th></tr></thead>
                    <tbody>
                        <tr th:each="alumno : ${alumnos}">
                            <td th:text="${alumno.nombre + ' ' + alumno.apellidos}">Alumno</td>
                            <td th:text="${alumno.curso}">Curso</td>
                            <td th:text="${alumno.dni}">DNI</td>
                            <td th:text="${alumno.email}">Email</td>
                            <td><a th:href="@{/empresas/alumnos/{id}(id=${alumno.id})}"
                                   class="btn-teal btn-pequeño">Ver</a></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(alumnos)}">
                            <td colspan="5" class="sin-datos">No hay alumnos asignados.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script th:src="@{/js/scripts.js}"></script>
</body></html>
